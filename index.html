<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JEE College Predictor | Magnitude Academy</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  margin: 0;
}
.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}
h1 {
  text-align: center;
  color: #38bdf8;
}
.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 12px;
  margin-top: 20px;
}
input, select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 8px;
  border: none;
}
button {
  background: #38bdf8;
  font-weight: bold;
  cursor: pointer;
}
.result {
  margin-top: 20px;
}
.badge {
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 12px;
}
.safe { background: green; }
.target { background: orange; }
.dream { background: red; }
table {
  width: 100%;
  margin-top: 10px;
  border-collapse: collapse;
}
td, th {
  padding: 10px;
  border-bottom: 1px solid #334155;
}
</style>
</head>

<body>
<div class="container">

<h1>🎯 JEE College Predictor</h1>
<p style="text-align:center;">by Magnitude Academy</p>

<div class="card">
<h3>Enter Details</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="mobile" placeholder="Mobile Number">

<input type="number" id="rank" placeholder="JEE Rank">
<select id="category">
<option value="OPEN">OPEN</option>
<option value="OBC">OBC</option>
<option value="SC">SC</option>
<option value="ST">ST</option>
</select>

<button onclick="predict()">Predict Colleges</button>
</div>

<div class="card result" id="result"></div>

</div>

<script>

// 🔥 SAMPLE DATA (Replace with full JoSAA dataset later)
const colleges = [
  {college:"NIT Jaipur", branch:"CSE", category:"OPEN", rank:4500},
  {college:"NIT Delhi", branch:"CSE", category:"OPEN", rank:8000},
  {college:"IIIT Allahabad", branch:"IT", category:"OPEN", rank:5000},
  {college:"NIT Kurukshetra", branch:"ECE", category:"OPEN", rank:12000},
  {college:"MNIT Jaipur", branch:"Mechanical", category:"OPEN", rank:20000}
];

function classify(userRank, cutoff) {
  if (userRank <= cutoff) return "safe";
  if (userRank <= cutoff * 1.1) return "target";
  return "dream";
}

function predict() {
  const name = document.getElementById("name").value;
  const mobile = document.getElementById("mobile").value;
  const rank = parseInt(document.getElementById("rank").value);
  const category = document.getElementById("category").value;

  if (!name || !mobile || !rank) {
    alert("Please fill all fields");
    return;
  }

  // 🔥 Lead capture (local storage for now)
  let leads = JSON.parse(localStorage.getItem("leads")) || [];
  leads.push({name, mobile, rank});
  localStorage.setItem("leads", JSON.stringify(leads));

  let filtered = colleges.filter(c => c.category === category);

  let output = "<h3>Results</h3><table><tr><th>College</th><th>Branch</th><th>Chance</th></tr>";

  filtered.forEach(c => {
    let tag = classify(rank, c.rank);
    output += `
      <tr>
        <td>${c.college}</td>
        <td>${c.branch}</td>
        <td><span class="badge ${tag}">${tag.toUpperCase()}</span></td>
      </tr>
    `;
  });

  output += "</table>";

  // 🔥 CTA
  output += `
    <div style="margin-top:20px; text-align:center;">
      <p>📞 Want personalized counselling?</p>
      <button onclick="callNow()">Talk to Expert</button>
    </div>
  `;

  document.getElementById("result").innerHTML = output;
}

function callNow() {
  window.location.href = "tel:9024233390";
}

</script>

</body>
</html>
